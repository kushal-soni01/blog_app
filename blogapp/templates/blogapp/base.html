<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link
			href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
			rel="stylesheet"
			integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
			crossorigin="anonymous"
		/>
		<link
			rel="stylesheet"
			href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
			integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
			crossorigin="anonymous"
			referrerpolicy="no-referrer"
		/>
		<style>
			.theme-toggle-btn {
				display: inline-flex;
				align-items: center;
				justify-content: center;
				width: 2.6rem;
				height: 2.6rem;
				border: 0px solid transparent;
				border-radius: 999px;
				background: transparent;
				color: inherit;
				transition:
					background-color 0.2s ease,
					transform 0.2s ease;
			}

			.theme-toggle-btn:hover {
				background: rgba(15, 23, 42, 0.08);
				transform: translateY(-1px);
			}

			.theme-toggle-btn:focus-visible {
				outline: 2px solid #0d6efd;
				outline-offset: 2px;
			}

			.navbar-action-group {
				display: flex;
				align-items: center;
				gap: 0.25rem;
			}

			.floating-messages {
				position: absolute;
				top: 5.5rem;
				left: 50%;
				transform: translateX(-50%);
				z-index: 1080;
				width: min(92vw, 540px);
			}

			.floating-message {
				border: none;
				border-radius: 14px;
				box-shadow: 0 14px 30px rgba(15, 23, 42, 0.16);
			}

			.floating-message.alert-success {
				background-color: #d1e7dd;
				color: #0f5132;
			}

			.floating-message.alert-danger {
				background-color: #f8d7da;
				color: #842029;
			}
		</style>
		<title>My Blog App: DJango Assignment</title>
	</head>
	<body>
		<nav class="navbar navbar-expand-lg bg-body-tertiary mb-4">
			<div class="container-fluid">
				<span
					class="navbar-brand bold fw-bolder"
					style="cursor: default; color: rgb(32, 32, 255)"
					>BLOG APP</span
				>
				<button
					class="navbar-toggler"
					type="button"
					data-bs-toggle="collapse"
					data-bs-target="#navbarNav"
					aria-controls="navbarNav"
					aria-expanded="false"
					aria-label="Toggle navigation"
				>
					<span class="navbar-toggler-icon"></span>
				</button>
				<div class="collapse navbar-collapse" id="navbarNav">
					<ul class="navbar-nav">
						<li class="nav-item">
							<a
								class="nav-link {% if view_mode != 'my' %}active{% endif %}"
								href="{% url 'home' %}"
								>All Posts</a
							>
						</li>
						<li class="nav-item">
							<a
								class="nav-link {% if view_mode == 'my' %}active{% endif %}"
								href="{% url 'home' %}?view=my"
								>My Posts</a
							>
						</li>
					</ul>
				</div>
				{% if user.is_authenticated%}
				<div class="navbar-action-group">
					<button
						class="theme-toggle-btn"
						id="themeToggle"
						type="button"
						aria-label="Toggle dark mode"
						aria-pressed="false"
					>
						<i class="fa-regular fa-sun" id="themeToggleIcon"></i>
					</button>
					<a href="{% url 'create_post' %}">
						<button
							class="btn btn-outline-success me-2"
							type="button"
						>
							Create Post
						</button>
					</a>
					<form method="post" action="{% url 'logout' %}">
						{% csrf_token %}
						<button
							type="submit"
							class="btn btn-outline-danger me-2"
						>
							Logout
						</button>
					</form>
				</div>
				{% else %}
				<div class="navbar-action-group">
					<button
						class="theme-toggle-btn"
						id="themeToggle"
						type="button"
						aria-label="Toggle dark mode"
						aria-pressed="false"
					>
						<i class="fa-regular fa-sun" id="themeToggleIcon"></i>
					</button>
					<a href="{% url 'login' %}" margin="20px">
						<button
							class="btn btn-outline-success me-2"
							type="button"
						>
							Login
						</button>
					</a>
					<a href="{% url 'signup' %}" margin="20px">
						<button
							class="btn btn-outline-primary me-2"
							type="button"
						>
							Signup
						</button>
					</a>
				</div>
				{% endif %}
			</div>
		</nav>
		{% if messages %}
		<div class="floating-messages">
			{% for message in messages %}
			<div
				class="alert alert-{% if message.tags == 'error' %}danger{% else %}{{ message.tags }}{% endif %} alert-dismissible fade show floating-message"
				role="alert"
			>
				{{ message }}
				<button
					type="button"
					class="btn-close"
					data-bs-dismiss="alert"
				></button>
			</div>
			{% endfor %}
		</div>
		{% endif %}

		{% block body %} {% endblock body%}
		<script>
			(function () {
				const storageKey = "blog-theme";
				const themeToggle = document.getElementById("themeToggle");
				const themeIcon = document.getElementById("themeToggleIcon");

				if (!themeToggle || !themeIcon) {
					return;
				}

				const getPreferredTheme = () => {
					const savedTheme = localStorage.getItem(storageKey);
					if (savedTheme === "light" || savedTheme === "dark") {
						return savedTheme;
					}

					return window.matchMedia("(prefers-color-scheme: dark)")
						.matches
						? "dark"
						: "light";
				};

				const applyTheme = (theme) => {
					document.documentElement.setAttribute(
						"data-bs-theme",
						theme,
					);
					themeToggle.setAttribute(
						"aria-label",
						theme === "dark"
							? "Switch to light mode"
							: "Switch to dark mode",
					);
					themeToggle.setAttribute(
						"aria-pressed",
						theme === "dark" ? "true" : "false",
					);
					themeIcon.classList.toggle("fa-sun", theme === "light");
					themeIcon.classList.toggle("fa-moon", theme === "dark");
				};

				const initialTheme = getPreferredTheme();
				applyTheme(initialTheme);

				themeToggle.addEventListener("click", function () {
					const currentTheme =
						document.documentElement.getAttribute(
							"data-bs-theme",
						) || "light";
					const nextTheme =
						currentTheme === "dark" ? "light" : "dark";

					localStorage.setItem(storageKey, nextTheme);
					applyTheme(nextTheme);
				});
			})();

			(function () {
				const alerts = document.querySelectorAll(".floating-message");

				alerts.forEach((alert) => {
					setTimeout(() => {
						alert.classList.remove("show");
						setTimeout(() => {
							alert.remove();
						}, 200);
					}, 3000);
				});
			})();
		</script>
	</body>
</html>
