{% extends 'blogapp/base.html' %} {% block body %}
<div class="container py-5">
	<div class="row justify-content-center">
		<div class="col-12 col-md-10 col-lg-7">
			<div class="card border-0 shadow-sm">
				<div class="card-body p-4 p-md-5">
					<div class="text-center mb-4">
						<div
							class="d-inline-flex align-items-center justify-content-center rounded-circle bg-danger-subtle text-danger mb-3"
							style="width: 72px; height: 72px"
						>
							<i class="fa-solid fa-trash-can fs-3"></i>
						</div>
						<h2 class="fw-bold mb-2 text-danger">Delete Post</h2>
						<p class="text-muted mb-0">
							This action cannot be undone. Please confirm before
							removing this post.
						</p>
					</div>

					<div class="border rounded-4 p-4 bg-body-tertiary mb-4">
						<h5 class="fw-semibold mb-2">{{ post.title }}</h5>
						<p class="text-body-secondary small mb-2">
							Created by {{ post.author }} on {{ post.created_at
							}}
						</p>
						<p class="mb-0">{{ post.content|truncatechars:220 }}</p>
					</div>

					<form method="post">
						{% csrf_token %}
						<div
							class="d-flex flex-column flex-sm-row justify-content-between gap-3"
						>
							<a
								href="{% url 'post_detail' post.id %}"
								class="btn btn-outline-secondary"
							>
								Keep Post
							</a>
							<button type="submit" class="btn btn-danger">
								<i class="fa-solid fa-trash-can me-1"></i>
								Yes, Delete Post
							</button>
						</div>
					</form>
				</div>
			</div>
		</div>
	</div>
</div>
{% endblock body %}
